<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Efek shadow tipis pada font -->
    <filter id="subtle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background broken white keemasan dengan sudut membulat (rounded) -->
  <rect width="400" height="400" rx="80" ry="80" fill="#F8F4E6" />
  
  <!-- Huruf F di tengah dengan padding proporsional 25% (ukuran font disesuaikan) -->
  <text x="50%" y="52%" 
        dominant-baseline="central" 
        text-anchor="middle" 
        font-family="'Times New Roman', Times, serif" 
        font-size="250" 
        fill="#3A3A3A" 
        filter="url(#subtle-shadow)">
    F
  </text>
</svg>
